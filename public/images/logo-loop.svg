<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .outer { animation: rotate 8s linear infinite; transform-origin: 60px 60px; }
    .middle { animation: rotate 12s linear infinite reverse; transform-origin: 60px 60px; }
    .inner { animation: rotate 6s linear infinite; transform-origin: 60px 60px; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
  </style>
  
  <!-- Outer ring -->
  <g class="outer">
    <circle cx="60" cy="60" r="52" fill="none" stroke="url(#strokeGrad)" stroke-width="2.5" stroke-dasharray="50 30" filter="url(#glow)"/>
  </g>
  
  <!-- Middle ring -->
  <g class="middle">
    <circle cx="60" cy="60" r="38" fill="none" stroke="url(#strokeGrad)" stroke-width="2" stroke-dasharray="35 20" opacity="0.8"/>
  </g>
  
  <!-- Inner circle -->
  <g class="inner">
    <circle cx="60" cy="60" r="22" fill="none" stroke="url(#strokeGrad)" stroke-width="3" stroke-dasharray="25 15" filter="url(#glow)"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="60" cy="60" r="5" fill="#FBBF24" class="pulse"/>
  
  <!-- Orbit dots -->
  <circle cx="60" cy="8" r="3" fill="#FCD34D" class="pulse"/>
  <circle cx="112" cy="60" r="3" fill="#FCD34D" class="pulse" style="animation-delay: 0.5s"/>
  <circle cx="60" cy="112" r="3" fill="#FCD34D" class="pulse" style="animation-delay: 1s"/>
  <circle cx="8" cy="60" r="3" fill="#FCD34D" class="pulse" style="animation-delay: 1.5s"/>
</svg>