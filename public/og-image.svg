<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Loop dourado -->
  <circle cx="600" cy="200" r="80" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <path d="M540 200 Q600 120 660 200 Q600 280 540 200" fill="none" stroke="url(#gold)" stroke-width="6"/>
  
  <!-- Title -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#D4AF37" text-anchor="middle">Workflow API Studio</text>
  
  <!-- Subtitle -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">WhatsApp com CRM e IA</text>
  
  <!-- Footer -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="24" fill="#999999" text-anchor="middle">workflowapi.com.br</text>
</svg>